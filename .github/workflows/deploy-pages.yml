name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: market-daily-brief-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site/assets _site/articles _site/data
          cp index.html sitemap.xml .nojekyll _site/
          cp -R assets/site.css assets/og _site/assets/
          cp -R articles/daily _site/articles/
          cp data/daily-articles.js data/latest-run.json _site/data/
          for dir in market-snapshots news-digests proofread-reports social-posts; do
            if [ -d "data/$dir" ]; then
              mkdir -p "_site/data/$dir"
              cp -R "data/$dir/." "_site/data/$dir/"
            fi
          done

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
